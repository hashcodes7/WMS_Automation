name: Run Single Test - TC292_P0_E2E_CreateColors_Solid
on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  
jobs:
  run-single-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run TC292_P0_E2E_CreateColors_Solid
        run: mvn -Dtest=E2E_Testcases.TC292_P0_E2E_CreateColors_Solid test

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport
          path: Reports/
          if-no-files-found: warn

      - name: Commit HTML report to repository
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull origin main
          git add Reports/*.html
          git commit -m "Add test report [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Reports/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      - name: Print Report Link
        run: |
          REPORT_NAME=$(find Reports -name "*.html" | head -n 1 | xargs -I {} basename "{}" | tr -d '\n')
          ENCODED_REPORT_NAME=$(echo "$REPORT_NAME" | jq -sRr @uri)
          echo "Here is your report just generated, click to view: https://hashcodes7.github.io/WMS_Automation/Reports/$ENCODED_REPORT_NAME"


