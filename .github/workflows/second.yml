name: Run Single Test - TC292_P0_E2E_CreateColors_Solid

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-single-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run TC292_P0_E2E_CreateColors_Solid
        run: mvn -Dtest=E2E_Testcases.TC292_P0_E2E_CreateColors_Solid test

      - name: Upload HTML Report
        if: always()  # Upload even if tests fail
        uses: actions/upload-artifact@v3
        with:
          name: ExtentReport
          path: Reports/  # Ensure this matches the folder created by your code
