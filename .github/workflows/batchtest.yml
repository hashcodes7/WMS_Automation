name: Run Batch Tests E2E

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Select run mode:'
        required: true
        default: 'batch'
        type: choice
        options:
          - batch
          - single
      test_class:
        description: 'Full test class name (used only in single mode)'
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run TestNG (batch or single)
        run: |
          if [[ "${{ github.event.inputs.mode }}" == "batch" ]]; then
            echo "Running batch suite..."
            mvn test -Dsurefire.suiteXmlFiles=Batch_Test_Scripts/E2E_batchTest.xml
          else
            echo "Running single test class: ${{ github.event.inputs.test_class }}"
            mvn -Dtest=${{ github.event.inputs.test_class }} test
          fi

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport
          path: Reports/
          if-no-files-found: warn

      - name: Commit HTML report to repository
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull origin main
          git add Reports/*.html
          git commit -m "Add test report [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Wait for GitHub Pages Deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for pages-build-deployment to complete..."
          for i in {1..30}; do
            RUN=$(gh run list --workflow="pages-build-deployment" --branch=main --limit=1 --json databaseId,status,conclusion -q '.[0]')
            STATUS=$(echo "$RUN" | jq -r '.status')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')
            echo "Status: $STATUS | Conclusion: $CONCLUSION"
            if [[ "$STATUS" == "completed" ]]; then
              if [[ "$CONCLUSION" == "success" ]]; then
                echo "✅ Pages deployment successful!"
                break
              else
                echo "❌ Pages deployment failed!"
                exit 1
              fi
            fi
            echo "⏳ Waiting..."
            sleep 10
          done

      - name: Print Report Link
        run: |
          REPORT_PATH=$(find Reports -name "*.html" -type f -exec stat --format='%Y %n' {} \; | sort -n | tail -n 1 | cut -d' ' -f2-)
          REPORT_NAME=$(basename "$REPORT_PATH" | sed -E 's/\.html.*/.html/')
          ENCODED_REPORT_NAME=$(printf "%s" "$REPORT_NAME" | jq -sRr @uri)
          echo "Final Report Name: $REPORT_NAME"
          echo "Encoded Report Name: $ENCODED_REPORT_NAME"
          echo "🔗 Live Report URL: https://hashcodes7.github.io/WMS_Automation/Reports/$ENCODED_REPORT_NAME"
